name: Quality

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typst package quality (${{ matrix.typst-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        typst-version:
          - 0.14.0
          - 0.14.2

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Typst
        uses: typst-community/setup-typst@v5.1.0
        with:
          typst-version: ${{ matrix.typst-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install Typos
        uses: taiki-e/install-action@v2.75.27
        with:
          tool: typos@1.46.0
          fallback: none

      - name: Install Typst quality tools
        run: |
          cargo install --locked typstyle --version 0.14.4
          cargo install --locked tytanic --version 0.3.3
          cargo install --locked --git https://github.com/typst/package-check.git --tag v0.4.5-1

      - name: Run strict quality checks
        run: make strict-check

      - name: Upload Tytanic artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tytanic-artifacts-${{ matrix.typst-version }}
          path: |
            tests/**/out
            tests/**/diff
          if-no-files-found: ignore
